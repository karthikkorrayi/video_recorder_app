name: video_recorder_app
description: OTN Video Recorder — Omni Trade Networks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & playback
  camera: ^0.10.6
  video_player: ^2.9.2
  video_compress: ^3.1.2
  video_thumbnail: ^0.5.3
  ffmpeg_kit_flutter_new: ^4.1.0

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

  google_mlkit_pose_detection: ^0.11.0

  # Storage & utilities
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  intl: ^0.19.0
  wakelock_plus: ^1.2.8
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  audioplayers: ^6.1.0

  shared_preferences: ^2.2.2

  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_local_notifications: ^17.2.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/otn_app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
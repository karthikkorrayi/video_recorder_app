name: video_recorder_app
description: OTN Video Recorder — Omni Trade Networks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & playback
  camera: ^0.10.6
  video_player: ^2.8.6
  video_compress: ^3.1.2

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

  google_mlkit_pose_detection: ^0.11.0

  # Storage & utilities
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  intl: ^0.19.0
  wakelock_plus: ^1.2.8
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  http: ^1.2.1

  shared_preferences: ^2.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
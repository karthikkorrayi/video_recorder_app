name: video_recorder_app
description: Video recorder with chunked upload
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.6
  video_player: ^2.8.6
  ffmpeg_kit_flutter_new: ^4.1.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  path_provider: ^2.1.2
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2          # network quality indicator
  google_sign_in: ^6.2.1             # Google auth for Drive access
  googleapis: ^12.0.0                # Google Drive API
  googleapis_auth: ^1.6.0            # Drive OAuth tokens
  google_mlkit_pose_detection: ^0.11.0  # hand/pose detection
  shared_preferences: ^2.2.3         # local session history storage
  intl: ^0.19.0                      # date formatting
  wakelock_plus: ^1.2.8              # keep screen on during recording
  http: ^1.2.1   # add this — needed for speed test in dashboard
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/service_account.json    # your Drive service account key